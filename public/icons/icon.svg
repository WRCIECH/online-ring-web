<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!--
      Off-centre radial gradient: bright highlight at ~2 o'clock (upper-right),
      dark at lower-left — approximates the CSS conic-gradient metallic sweep.
    -->
    <radialGradient id="ring-shine" cx="68%" cy="28%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#fff8c0"/>
      <stop offset="14%"  stop-color="#fce870"/>
      <stop offset="30%"  stop-color="#f4d458"/>
      <stop offset="50%"  stop-color="#c8982a"/>
      <stop offset="68%"  stop-color="#6a4008"/>
      <stop offset="84%"  stop-color="#3a2004"/>
      <stop offset="100%" stop-color="#1a0900"/>
    </radialGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="#161228"/>

  <!-- Soft ambient glow behind the ring -->
  <circle cx="128" cy="128" r="99" fill="none"
          stroke="#d4a030" stroke-width="22" stroke-opacity="0.15"
          filter="url(#glow)"/>

  <!--
    Ring shape: outer circle r=106 minus inner hole r=63.
    Uses evenodd fill rule so the inner path cuts out the centre.
    Both arcs must be present and wound opposite to each other for evenodd to work.
  -->
  <path fill-rule="evenodd" fill="url(#ring-shine)"
    d="
      M 128 22
      A 106 106 0 1 1 127.99 22
      Z
      M 128 65
      A 63 63 0 1 0 127.99 65
      Z
    "/>
</svg>
